        <script>
          function moveCarousel(direction) {
            const videoCards = document.querySelector('.video-cards');
            const cardWidth = document.querySelector('.video-card').offsetWidth;
            const maxOffset = videoCards.scrollWidth - videoCards.clientWidth;
        
            // Calculate the current translateX value (if any)
            let currentOffset = parseInt(videoCards.style.transform.replace('translateX(', '').replace('px)', '')) || 0;
        
            // Calculate the new offset (move left if direction is -1, move right if direction is 1)
            let newOffset = currentOffset + (direction * cardWidth);
        
            // Prevent the carousel from moving too far left (positive values) or too far right (negative values)
            if (newOffset > 0) {
              newOffset = 0;  // Prevent moving too far left
            } else if (newOffset < -maxOffset) {
              newOffset = -maxOffset;  // Prevent moving too far right
            }
        
            // Apply the new transform value
            videoCards.style.transform = `translateX(${newOffset}px)`;
          }
        </script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  let rotationAngle = 0; // Кут повороту

  new fullpage("#fullpage", {
    licenseKey: "gplv3",
    autoScrolling: true,
    scrollHorizontally: true,
    navigation: true,
    navigationPosition: "right",

    // Поворот фону при прокрутці
    onLeave: function (origin, destination, direction) {
      const backgroundImage = document.querySelector(".background-image");
      if (backgroundImage) { // Переконуємось, що елемент існує
        if (direction === "down") {
          rotationAngle += 90;
        } else {
          rotationAngle -= 90;
        }
        backgroundImage.style.transform = `rotate(${rotationAngle}deg)`;
      }
    },
  });

  console.log("FullPage.js ініціалізований із ефектом повороту!");
});

</script>
